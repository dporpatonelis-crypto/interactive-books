<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψηφιακή Βιβλιοθήκη Μαθημάτων</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .book-card { display: block; background: var(--accent); color: white; padding: 20px; margin: 15px 0; border-radius: 12px; text-decoration: none; font-size: 1.2rem; font-weight: bold; transition: transform 0.2s ease, opacity 0.2s ease; }
        .book-card:hover { transform: translateY(-5px); opacity: 0.9; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #7f8c8d; }
        .loading { color: #7f8c8d; font-style: italic; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Επιλογή Μαθήματος</h1>
        <div id="books-list"><p class="loading">Φόρτωση βιβλίων...</p></div>
        <div class="footer">Συνδεδεμένο με interactive lessons</div>
    </div>

    <script>
        async function loadBooks() {
            const container = document.getElementById('books-list');
            try {
                const res = await fetch('books.json');
                if (!res.ok) throw new Error('Δεν βρέθηκε το books.json');
                const data = await res.json();

                container.innerHTML = '';
                data.books.forEach(book => {
                    const a = document.createElement('a');
                    a.href = `template/index.html?book=${book.id}`;
                    a.className = 'book-card';
                    a.style.background = book.color || '#3498db';
                    a.textContent = `${book.emoji || '📖'} ${book.title} - Interactive`;
                    container.appendChild(a);
                });
            } catch (e) {
                container.innerHTML = `<p class="error">❌ Σφάλμα φόρτωσης: ${e.message}</p>`;
            }
        }

        window.onload = loadBooks;
    </script>
</body>
</html>
